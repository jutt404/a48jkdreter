workflows:
  arrty-admin-notifier-debug:
    name: Arrty Trails Admin Notifier APK
    max_build_duration: 60
    environment:
      java: 17

    scripts:
      - name: Show project files
        script: |
          ls -la
          ls -la app
          test -f app/google-services.json && echo "google-services.json OK"

      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Debug APK
        script: |
          gradle assembleDebug --stacktrace

    artifacts:
      - app/build/outputs/**/*.apk
